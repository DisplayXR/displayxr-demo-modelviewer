name: Build Linux

# modelviewer Linux build-green dev loop (issue #40; recipe: the runtime repo's
# docs/guides/linux-demo-port.md; golden reference: displayxr-demo-mediaplayer).
#
# TRI-LTS MATRIX: the deployment target is Ubuntu 26.04 + Intel iGPU, but we also
# keep 22.04 (where render can be validated on hand today) and 24.04 green — so
# "build-green" means "builds on every supported toolchain (GCC 11 / 13 / 15,
# ffmpeg 4.4 / 6 / 7)", not just whatever ubuntu-latest happens to be. 22.04/24.04
# use hosted runners; 26.04 runs in a container (no hosted 26.04 runner yet).
#
# PROMOTED to a PR-triggered required check (runtime issue
# DisplayXR/displayxr-runtime#722): runs on every PR like the runtime's own
# build-linux.yml, with a DetectChanges docs_only short-circuit so doc-only PRs
# report success in seconds without building. Still also runs on manual dispatch
# + `linux*` branch pushes.
#
# Build-green scope only: CI has no display/GPU, so the app is never run here;
# on-screen validation is a separate pass gated on the runtime's Linux present +
# hardware (26.04/Intel primary; 22.04/NVIDIA is the interim render check).

on:
  workflow_dispatch: {}
  pull_request: {}
  push:
    branches:
      - 'linux'
      - 'linux-**'
      - 'feature/linux-**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  DetectChanges:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Detected non-PR trigger — docs_only=false"
            exit 0
          fi
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)
          NON_DOC=$(echo "$CHANGED" | grep -vE '^(docs/|.*\.md$|LICENSE$|\.github/ISSUE_TEMPLATE/)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected docs_only=$(grep ^docs_only= "$GITHUB_OUTPUT" | cut -d= -f2)"

  Build:
    name: Build (Ubuntu ${{ matrix.lts }})
    needs: DetectChanges
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - lts: "22.04"
            runner: ubuntu-22.04
          - lts: "24.04"
            runner: ubuntu-24.04
          - lts: "26.04"
            runner: ubuntu-latest
            container: ubuntu:26.04
    steps:
      - name: Docs-only short-circuit
        if: needs.DetectChanges.outputs.docs_only == 'true'
        run: echo "Doc-only change — reporting success without building."

      # In the 26.04 container we start as root with a bare image — install git
      # BEFORE checkout (which shells out to git). No-op on the hosted runners.
      - name: Bootstrap container (git for checkout)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          if [ "$(id -u)" = "0" ] && ! command -v git >/dev/null; then
            apt-get update && apt-get install -y --no-install-recommends git ca-certificates
          fi

      - uses: actions/checkout@v5
        if: needs.DetectChanges.outputs.docs_only != 'true'

      # Base playbook deps + the GLX-flip pair (libxcb-glx0-dev + libxxf86vm-dev:
      # once GL/EGL headers are present the OpenXR-SDK-Source build flips on GLX).
      # SUDO shim so the same step works on hosted runners (non-root, has sudo)
      # and in the container (root, no sudo). Vendor-neutral libegl-dev/libgl-dev
      # so the names resolve across 22.04/24.04/26.04.
      - name: Install dependencies
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          SUDO=""; [ "$(id -u)" != "0" ] && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y \
            build-essential cmake ninja-build pkg-config git ca-certificates curl \
            libvulkan-dev vulkan-validationlayers glslang-tools \
            libx11-dev libxcb1-dev libx11-xcb-dev \
            libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev libegl-dev libgl-dev libasound2-dev \
            libxxf86vm-dev libxcb-glx0-dev

      - name: Assert required dev libraries are present
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          pkg-config --exists vulkan && echo "vulkan: $(pkg-config --modversion vulkan)" \
            || { echo "::error::vulkan not found via pkg-config"; exit 1; }
          command -v glslangValidator >/dev/null \
            || { echo "::error::glslangValidator missing (glslang-tools)"; exit 1; }

      - name: Build (build-green; app is not run — no display on CI)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: ./scripts/build_linux.sh

      - name: Assert build artifacts
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          test -x build/linux/model_viewer_handle_vk_linux \
            || { echo "::error::model_viewer_handle_vk_linux was not built"; exit 1; }
          test -f /tmp/openxr-install/lib/libopenxr_loader.so \
            || { echo "::error::OpenXR loader was not built"; exit 1; }
